<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Doctor portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EFF7"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E8EE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- shoulders / white coat -->
  <path d="M 140 1000 C 180 780 260 720 400 720 C 540 720 620 780 660 1000 Z" fill="url(#coat)"/>
  <!-- neckline v -->
  <path d="M 360 740 L 400 820 L 440 740 Z" fill="#14406B" opacity="0.08"/>
  <!-- head -->
  <circle cx="400" cy="540" r="150" fill="#CBD5E2"/>
  <!-- shadow under chin -->
  <ellipse cx="400" cy="700" rx="80" ry="18" fill="#94A3B5" opacity="0.3"/>
  <!-- placeholder wordmark -->
  <g font-family="Georgia, serif" text-anchor="middle" fill="#0B2540" opacity="0.55">
    <text x="400" y="900" font-size="34" font-weight="400">Dr. Dwarakanath Reddy</text>
    <text x="400" y="940" font-size="18" opacity="0.7">Portrait placeholder</text>
  </g>
</svg>
